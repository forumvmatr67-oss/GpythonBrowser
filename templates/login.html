{% extends "base.html" %}
{% block content %}
<div class="form-card">
    <h2>🔐 Вход в GPython</h2>
    <form method="post">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Войти</button>
    </form>
    <p style="margin-top: 1rem;">Нет аккаунта? <a href="/register">Создать</a></p>
</div>
{% endblock %}
